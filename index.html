<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Firebase Form</title>
</head>
<body>

<h2>Отправка данных</h2>

<input type="text" id="name" placeholder="Имя"><br><br> <input type="email" id="email" placeholder="Email"><br><br> <button onclick="sendData()">Отправить</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDcU37M25AzOMPBJMLGVjBiK5Nn_-ElCC4",
    authDomain: "mode-50849.firebaseapp.com",
    projectId: "mode-50849",
    storageBucket: "mode-50849.firebasestorage.app",
    messagingSenderId: "844961525346",
    appId: "1:844961525346:web:223d80854356b5d82aab3b",
    measurementId: "G-DRPKBQ9VSR"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.sendData = async function() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    try {
      await addDoc(collection(db, "requests"), {
        name: name,
        email: email,
        createdAt: new Date()
      });

      alert("Данные отправлены!");
    } catch (error) {
      console.error("Ошибка:", error);
      alert("Ошибка отправки");
    }
  }
</script>

</body>
</html>
